<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="30%" cy="30%" r="90%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#050510"/>
    </radialGradient>
    <linearGradient id="arc1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#39d0d8"/>
      <stop offset="100%" stop-color="#3fb950"/>
    </linearGradient>
    <linearGradient id="arc2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0821e"/>
      <stop offset="100%" stop-color="#e3b341"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="104" fill="url(#bg)"/>

  <!-- Subtle inner border -->
  <rect x="16" y="16" width="480" height="480" rx="104" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.06"/>

  <!-- RF burst arcs — upper fan (cyan/green) -->
  <!-- arc 1: smallest, most faded -->
  <path d="M192,256 Q248,176 192,96" fill="none" stroke="url(#arc1)" stroke-width="16" stroke-linecap="round" opacity="0.25"/>
  <!-- arc 2 -->
  <path d="M192,256 Q288,144 192,56" fill="none" stroke="url(#arc1)" stroke-width="14" stroke-linecap="round" opacity="0.42"/>
  <!-- arc 3 -->
  <path d="M192,256 Q328,112 256,40" fill="none" stroke="url(#arc1)" stroke-width="12" stroke-linecap="round" opacity="0.60"/>
  <!-- arc 4: largest, most visible -->
  <path d="M192,256 Q376,80 320,32" fill="none" stroke="url(#arc1)" stroke-width="10" stroke-linecap="round" opacity="0.82"/>

  <!-- RF burst arcs — lower fan (orange/gold) -->
  <path d="M192,256 Q248,336 192,416" fill="none" stroke="url(#arc2)" stroke-width="16" stroke-linecap="round" opacity="0.25"/>
  <path d="M192,256 Q288,368 192,456" fill="none" stroke="url(#arc2)" stroke-width="14" stroke-linecap="round" opacity="0.42"/>
  <path d="M192,256 Q328,400 256,472" fill="none" stroke="url(#arc2)" stroke-width="12" stroke-linecap="round" opacity="0.60"/>
  <path d="M192,256 Q376,432 320,480" fill="none" stroke="url(#arc2)" stroke-width="10" stroke-linecap="round" opacity="0.82"/>

  <!-- Source glow halo -->
  <circle cx="192" cy="256" r="52" fill="#f0821e" opacity="0.12"/>
  <circle cx="192" cy="256" r="36" fill="#f0821e" opacity="0.18"/>

  <!-- Source dot -->
  <circle cx="192" cy="256" r="22" fill="#f0821e"/>
  <circle cx="192" cy="256" r="12" fill="#ffffff" opacity="0.92"/>

  <!-- aR label — right side of burst -->
  <text x="316" y="244" text-anchor="middle" font-size="64" font-family="monospace" font-weight="900" fill="#39d0d8" letter-spacing="-2">aR</text>
  <text x="316" y="298" text-anchor="middle" font-size="34" font-family="monospace" fill="#8b949e" letter-spacing="8">TRACKER</text>
</svg>
