<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#1c2330"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </radialGradient>
    <radialGradient id="sweep" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3fb950" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#3fb950" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="4" y="4" width="120" height="120" rx="26" fill="url(#bg)" stroke="#30363d" stroke-width="2"/>

  <!-- radar rings -->
  <circle cx="64" cy="64" r="46" fill="none" stroke="#21262d" stroke-width="2"/>
  <circle cx="64" cy="64" r="32" fill="none" stroke="#21262d" stroke-width="2"/>
  <circle cx="64" cy="64" r="18" fill="none" stroke="#21262d" stroke-width="2"/>

  <!-- sweep -->
  <path d="M64 64 L64 18 A46 46 0 0 1 100 40 Z" fill="url(#sweep)"/>

  <!-- crosshair -->
  <line x1="64" y1="14" x2="64" y2="114" stroke="#21262d" stroke-width="1.5"/>
  <line x1="14" y1="64" x2="114" y2="64" stroke="#21262d" stroke-width="1.5"/>

  <!-- station blips -->
  <circle cx="64" cy="64" r="6" fill="#3fb950"/>
  <circle cx="64" cy="64" r="10" fill="none" stroke="#3fb950" stroke-width="1.5" opacity="0.6"/>
  <circle cx="84" cy="46" r="4" fill="#f0821e"/>
  <circle cx="42" cy="80" r="4" fill="#39d0d8"/>
  <circle cx="88" cy="82" r="3.5" fill="#e3b341"/>
  <circle cx="38" cy="42" r="3.5" fill="#f0821e"/>

  <!-- orange accent ring -->
  <circle cx="64" cy="64" r="46" fill="none" stroke="#f0821e" stroke-width="2.5" opacity="0.85"/>
</svg>
